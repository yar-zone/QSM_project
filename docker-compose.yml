services:

  # ─── Laravel Backend ─────────────────────────────────────
  qsm-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qsm-backend
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./backend:/var/www/html
      - /var/www/html/vendor
      - /var/www/html/bootstrap/cache
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY:-base64:M+05kN+/QFbhBslGf8KU4hCl5+dMa0kljWFSc/QVOFM=}
      - DB_CONNECTION=sqlite
      - SESSION_DRIVER=file
      - CACHE_STORE=file
      - QUEUE_CONNECTION=sync
      - LOG_CHANNEL=stderr
    expose:
      - "8000"
    networks:
      - qsm-network

  # ─── React Frontend (Vite Dev Server) ───────────────────
  qsm-frontend:
    image: node:22-alpine
    container_name: qsm-frontend
    restart: unless-stopped
    working_dir: /app
    volumes:
      - ./frontend:/app
      - qsm-frontend-node-modules:/app/node_modules
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
    command: >
      sh -c "
        npm ci &&
        npm run dev -- --host 0.0.0.0 --port 5173
      "
    expose:
      - "5173"
    depends_on:
      - qsm-backend
    networks:
      - qsm-network

  # ─── Nginx Reverse Proxy ────────────────────────────────
  qsm-nginx:
    image: nginx:alpine
    container_name: qsm-nginx
    restart: unless-stopped
    volumes:
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    ports:
      - "80:80"
    depends_on:
      - qsm-backend
      - qsm-frontend
    networks:
      - qsm-network

networks:
  qsm-network:
    driver: bridge

volumes:
  qsm-frontend-node-modules:
