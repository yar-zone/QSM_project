services:
  mysql:
    image: mysql:8.0
    container_name: qsm-mysql
    restart: unless-stopped
    ports:
      - "3307:3306"
    environment:
      MYSQL_ROOT_PASSWORD: qsm_password
      MYSQL_DATABASE: qsm
      MYSQL_USER: qsm_user
      MYSQL_PASSWORD: qsm_password
    volumes:
      - mysql_data:/var/lib/mysql
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --default-authentication-plugin=mysql_native_password
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-pqsm_password"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: qsm-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DB_CONNECTION: mysql
      DB_HOST: mysql
      DB_PORT: 3306
      DB_DATABASE: qsm
      DB_USERNAME: qsm_user
      DB_PASSWORD: qsm_password
      APP_ENV: production
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      SESSION_DRIVER: file
      CACHE_STORE: file
      LOG_CHANNEL: stderr
      QUEUE_CONNECTION: sync
      MAIL_MAILER: smtp
      MAIL_HOST: smtp.gmail.com
      MAIL_PORT: 587
      MAIL_USERNAME: nur.quran.school@gmail.com
      MAIL_PASSWORD: "klyw vlni nedw kxto"
      MAIL_ENCRYPTION: tls
      MAIL_FROM_ADDRESS: nur.quran.school@gmail.com
      MAIL_FROM_NAME: "نور القرآن"
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - backend_storage:/var/www/html/storage

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: qsm-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    environment:
      VITE_API_PROXY_TARGET: http://backend:8000
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      - backend
    volumes:
      - /app/node_modules

volumes:
  mysql_data:
  backend_storage:
