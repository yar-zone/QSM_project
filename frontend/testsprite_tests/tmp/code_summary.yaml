version: "2"
type: frontend
tech_stack:
  - React
  - Vite
  - Tailwind CSS
  - TanStack Router
  - Radix UI
  - React Query
  - Axios
routes:
  - path: /auth
    file: src/routes/auth.tsx
    auth_required: false
    description: Authentication page
  - path: /
    file: src/routes/index.tsx
    auth_required: false
    description: Home page
  - path: /dashboard
    file: src/routes/_authenticated/dashboard.tsx
    auth_required: true
    description: Dashboard page
  - path: /students
    file: src/routes/_authenticated/students.tsx
    auth_required: true
    description: Students management page
  - path: /teachers
    file: src/routes/_authenticated/teachers.tsx
    auth_required: true
    description: Teachers management page
features:
  - name: Authentication
    description: User authentication flow
    files:
      - src/routes/auth.tsx
    entry_route: /auth
    user_interactions:
      - Fill login form
      - Click submit
    api_calls:
      - method: POST
        endpoint: /api/login
    auth_required: false
  - name: Dashboard
    description: View main dashboard
    files:
      - src/routes/_authenticated/dashboard.tsx
    entry_route: /dashboard
    user_interactions:
      - View stats
    api_calls:
      - method: GET
        endpoint: /api/dashboard
    auth_required: true
  - name: Student Management
    description: Manage students
    files:
      - src/routes/_authenticated/students.tsx
    entry_route: /students
    user_interactions:
      - View list of students
      - Create new student
      - Edit student
    api_calls:
      - method: GET
        endpoint: /api/students
    auth_required: true
known_limitations: []
