<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Standalone Vanilla Test</title>
</head>
<body>
  <div id="root" style="padding:40px;font-family:Arial">
    <h2>Vanilla JS Test</h2>
    <input id="testInput" placeholder="Type here..." style="border:1px solid #ccc;padding:8px 12px;font-size:16px;width:300px">
    <p id="output">You typed: </p>
  </div>
  <script>
    var input = document.getElementById('testInput');
    var output = document.getElementById('output');
    input.addEventListener('input', function() {
      output.textContent = 'You typed: ' + input.value;
    });
    console.log('Vanilla test initialized');
  </script>
</body>
</html>
