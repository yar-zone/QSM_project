<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Test Page</title>
  <style>
    body { font-family: Arial, sans-serif; background: #f5f5f5; padding: 40px; }
    input { border: 1px solid #ccc; padding: 8px 12px; font-size: 16px; width: 300px; }
    button { background: #007979; color: white; border: none; padding: 8px 20px; font-size: 16px; cursor: pointer; margin-top: 10px; }
  </style>
</head>
<body>
  <h2>Plain HTML Test</h2>
  <p>Type in the field below and click the button.</p>
  <form method="POST" action="http://localhost:8000/api/auth/login" id="loginForm">
    <div><label>Email:</label></div>
    <input type="email" name="email" id="email" value="admin@qsm.com" />
    <div style="margin-top:8px"><label>Password:</label></div>
    <input type="password" name="password" id="password" value="password" />
    <div><button type="submit">Sign In</button></div>
  </form>
  <script>
    document.getElementById('loginForm').addEventListener('submit', async function(e) {
      e.preventDefault();
      try {
        const res = await fetch('http://localhost:8000/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value })
        });
        const data = await res.json();
        alert('Token: ' + (data.token || JSON.stringify(data)));
      } catch(err) {
        alert('Error: ' + err.message);
      }
    });
  </script>
</body>
</html>
