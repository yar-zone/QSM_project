<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>React CDN Test</title>
</head>
<body>
  <div id="root"></div>
  <script type="importmap">
  {
    "imports": {
      "react": "https://esm.sh/react@19.2.6",
      "react-dom": "https://esm.sh/react-dom@19.2.6",
      "react-dom/client": "https://esm.sh/react-dom@19.2.6/client"
    }
  }
  </script>
  <script type="module">
    import React from 'react';
    import { createRoot } from 'react-dom/client';

    function App() {
      const [val, setVal] = React.useState("");
      return React.createElement('div', { style: { padding: '40px', fontFamily: 'Arial' } },
        React.createElement('h2', null, 'React ESM Test'),
        React.createElement('input', {
          value: val,
          onChange: (e) => setVal(e.target.value),
          placeholder: 'Type here...',
          style: { border: '1px solid #ccc', padding: '8px 12px', fontSize: '16px', width: '300px' }
        }),
        React.createElement('p', null, 'You typed: ' + val)
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(React.createElement(App));
  </script>
</body>
</html>
